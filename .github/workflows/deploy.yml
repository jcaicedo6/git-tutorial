name: Deploy site

# Build the MkDocs site and publish it to GitHub Pages on every push to main.
on:
  push:
    branches:
      - main
  workflow_dispatch:      # lets you trigger a rebuild by hand from the Actions tab

permissions:
  contents: write         # needed to push the built site to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('requirements.txt') }}
          path: ~/.cache/pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and deploy to GitHub Pages
        run: mkdocs gh-deploy --force
